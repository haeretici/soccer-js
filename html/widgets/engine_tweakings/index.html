<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engine Tweakings — Soccer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="../../css/app.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #0d1117;
        }
        .popup-shell {
            max-width: 100%;
            padding: 0.75rem 0.85rem 1.25rem;
        }
        .popup-shell .engine-tweakings-widget {
            border: none;
            box-shadow: none;
            background: transparent;
        }
        .popup-banner {
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="popup-shell">
        <div class="popup-banner text-info font-monospace mb-2 px-1">
            ● ENGINE TWEAKINGS <span class="text-muted">— live link to match window</span>
        </div>
        <div id="panelHost" class="card glass-panel engine-tweakings engine-tweakings-widget border-0 mb-0">
            <div class="p-3 text-muted small">Loading panel…</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Inject panel markup then run popup bridge
        (async function boot() {
            const host = document.getElementById('panelHost');
            try {
                const res = await fetch('panel.html', { cache: 'no-cache' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                host.innerHTML = await res.text();
            } catch (err) {
                host.innerHTML = '<div class="p-3 text-danger small">Failed to load panel.html: '
                    + String(err.message || err) + '</div>';
                return;
            }
            const s = document.createElement('script');
            s.src = 'popup.js?v=1';
            document.body.appendChild(s);
        })();
    </script>
</body>
</html>
